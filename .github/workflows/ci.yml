name: Build and Push Docker Image

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.pareenrathore }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build Docker image
        run: |
          docker build -t ${{ secrets.pareenrathore }}/assessment-app:latest .
          docker tag ${{ secrets.pareenrathore }}/assessment-app:latest ${{ secrets.pareenrathore }}/assessment-app:${{ github.sha }}

      - name: Push Docker image
        run: |
          docker push ${{ secrets.pareenrathore }}/assessment-app:latest
          docker push ${{ secrets.pareenrathore }}/assessment-app:${{ github.sha }}