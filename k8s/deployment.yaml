apiVersion: apps/v1
kind: Deployment
metadata:
  name: assessment-app
  namespace: assessment
  labels:
    app: assessment-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: assessment-app
  template:
    metadata:
      labels:
        app: assessment-app
    spec:
      containers:
        - name: assessment-app
          image: pareenrathore/assessment-app:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 5000
          env:
            - name: APP_NAME
              value: "Enterprise GitOps Assessment App"
            - name: APP_VERSION
              value: "v1.0"
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 15
            periodSeconds: 20